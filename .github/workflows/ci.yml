name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # The backend embeds the built frontend via `//go:embed all:dist`, which
      # requires at least one file to exist. The real build isn't needed to vet
      # or test the Go code, so create a placeholder to satisfy the directive.
      - name: Prepare embed placeholder
        run: |
          mkdir -p backend/internal/web/dist
          touch backend/internal/web/dist/.gitkeep

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: go test
        working-directory: backend
        run: go test ./...

  frontend:
    name: Frontend (svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run check
