services:
  capital-hub:
    restart: unless-stopped
    image: capital-hub:latest
    container_name: capital-hub
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    # Run as the host user that owns ./ch_data so the bind mount is writable.
    user: "1000:1000"
    environment:
      CH_ADDR: ":8080"
      # Externally reachable URL (used for OIDC redirects and email links).
      CH_BASE_URL: ${CH_BASE_URL:-http://localhost:8080}
      CH_SESSION_SECRET: ${CH_SESSION_SECRET:?set CH_SESSION_SECRET in .env}
      CH_SESSION_TTL_HOURS: ${CH_SESSION_TTL_HOURS:-720}
      CH_DATA_DIR: /data
      CH_LOG_LEVEL: ${CH_LOG_LEVEL:-info}
      # Comma-separated trusted proxy CIDRs (enables X-Forwarded-* handling).
      CH_TRUSTED_PROXIES: ${CH_TRUSTED_PROXIES:-}
      CH_BOOTSTRAP_ADMIN_USERNAME: ${CH_BOOTSTRAP_ADMIN_USERNAME:-}
      CH_BOOTSTRAP_ADMIN_EMAIL: ${CH_BOOTSTRAP_ADMIN_EMAIL:-}
      CH_BOOTSTRAP_ADMIN_PASSWORD: ${CH_BOOTSTRAP_ADMIN_PASSWORD:-}
      CH_OIDC_ENABLED: ${CH_OIDC_ENABLED:-false}
      CH_OIDC_ISSUER_URL: ${CH_OIDC_ISSUER_URL:-}
      CH_OIDC_CLIENT_ID: ${CH_OIDC_CLIENT_ID:-}
      CH_OIDC_CLIENT_SECRET: ${CH_OIDC_CLIENT_SECRET:-}
      CH_OIDC_REDIRECT_URL: ${CH_OIDC_REDIRECT_URL:-}
      CH_OIDC_ADMIN_GROUP: ${CH_OIDC_ADMIN_GROUP:-}
    volumes:
      - ./ch_data:/data
    ports:
      - 8080:8080
